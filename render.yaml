# Render Blueprint — deploy the Fresso backend.
# Push this repo to GitHub, then in Render: New → Blueprint → pick the repo.
# Render auto-detects this file and provisions the service + disk below.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: fresso-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # "free" sleeps on idle; "starter" stays warm
    healthCheckPath: /api/health
    autoDeploy: true
    # Persistent disk so the SQLite DB survives redeploys.
    # Mounted at /app/instance to match the app's instance folder.
    disk:
      name: fresso-data
      mountPath: /app/instance
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      # Auto-generated by Render and kept stable across deploys.
      - key: SECRET_KEY
        generateValue: true
      # Set these in the Render dashboard (marked sync:false = not in git).
      - key: OPENAI_API_KEY
        sync: false
      - key: USDA_API_KEY
        sync: false
      # Allowed frontends. Update with your real web/app origins.
      - key: CORS_ORIGINS
        sync: false
      # Leave DATABASE_URL unset to use SQLite on the mounted disk.
      # To use Postgres instead, add a Render Postgres and set this.
      # - key: DATABASE_URL
      #   sync: false
