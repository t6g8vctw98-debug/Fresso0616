# Fly.io config for the Fresso backend.
# First run:  fly launch --no-deploy   (creates the app, keep this file)
# Then:       fly volumes create fresso_data --size 1 --region fra
#             fly secrets set SECRET_KEY=... OPENAI_API_KEY=... USDA_API_KEY=... CORS_ORIGINS=...
#             fly deploy
# Pick a region near your users: fra (Frankfurt) / ams (Amsterdam) for EU.

app = "fresso-backend"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.health]
      method = "GET"
      path = "/api/health"
      interval = "30s"
      timeout = "5s"
      grace_period = "20s"

# Persistent volume so the SQLite DB survives restarts/redeploys.
[mounts]
  source = "fresso_data"
  destination = "/app/instance"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
